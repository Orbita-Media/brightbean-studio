services:
  migrate:
    build: .
    command: python manage.py migrate --noinput
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2
    expose:
      - "8000"
    volumes:
      - media_data:/app/media
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  worker:
    build: .
    command: python manage.py process_tasks
    volumes:
      - media_data:/app/media
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  maintenance:
    build: .
    command: >
      sh -c "
      while true; do
        echo \"[maintenance] $$(date): Running clearsessions...\"
        python manage.py clearsessions
        echo \"[maintenance] $$(date): Running media cleanup...\"
        python manage.py cleanup_orphaned_media --once --min-age-days 14
        echo \"[maintenance] $$(date): Done. Sleeping 24h.\"
        sleep 86400
      done
      "
    volumes:
      - media_data:/app/media
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-brightbean}
      POSTGRES_USER: ${POSTGRES_USER:-brightbean}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-brightbean}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
